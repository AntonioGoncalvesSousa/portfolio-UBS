<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>Grupo PMSUS UBS</title>
    <link rel="stylesheet" href="./../css/styles.css">
</head>

<body>
    <div class="navbar">

                <img class="icon" src="./../css/assets/estetoscopio.png">

            </div>
            <div class="content">
                <a class="menu" href="./../index.html">Início</a>

        </div>

    <div class="memberBg">

            <div class="challenges">

                    <h1>Desafios</h1>

                </div>
            </div>
            <div class="motivations">
